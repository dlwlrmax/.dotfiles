# BTR3K USB DAC ALSA stability fix
# Prevents "Broken pipe" errors (snd_pcm_avail after recover)
# Required: WirePlumber 0.5.x + PipeWire 1.6.x
#
# Applies to: FiiO BTR3K (0a12:1004)
# After changing: systemctl --user restart wireplumber

monitor.alsa.rules = [
    # ── Device-level rules (card) ──────────────────────────────────
    {
        matches = [
            {
                device.name = "~alsa_card.usb-FiiO_FiiO_BTR3K.*"
            }
        ]
        actions = {
            update-props = {
                # Disable Pro Audio to keep standard stereo profile
                api.acp.disable-pro-audio = true
            }
        }
    }

    # ── Node-level rules (sink) ────────────────────────────────────
    {
        matches = [
            {
                node.name = "~alsa_output.usb-FiiO_FiiO_BTR3K.*"
            }
        ]
        actions = {
            update-props = {
                # Never suspend — prevents "Broken pipe" on resume
                session.suspend-timeout-seconds = 0

                # Buffer stability settings
                api.alsa.period-size  = 1024
                api.alsa.period-num   = 3
                api.alsa.headroom     = 4096

                # IRQ-based scheduling (more stable for USB devices)
                api.alsa.disable-tsched = true

                # Keep this device preferred
                priority.driver  = 1109
                priority.session = 1109
            }
        }
    }

    # ── Node-level rules (source — mic passthrough if present) ─────
    {
        matches = [
            {
                node.name = "~alsa_input.usb-FiiO_FiiO_BTR3K.*"
            }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
                api.alsa.period-size  = 1024
                api.alsa.period-num   = 3
                api.alsa.headroom     = 2048
            }
        }
    }
]

# Stremio Enhanced - Default Input Configuration
# This file is automatically created if it doesn't exist
# You can customize it at: ~/.local/share/stremio/mpv-portable/input.conf
#
# MPV default keybindings are available. See: https://mpv.io/manual/master/#interactive-control
# To add custom shaders (like Anime4K), place them in ~/.local/share/stremio/mpv-portable/shaders/
# and configure keybindings here.

# ── Shader Profile Switching (profiles defined in mpv.conf) ──
CTRL+0 apply-profile "Anime4K_Off"; show-text "Shaders: None"
CTRL+1 apply-profile "Anime_Anime4K_ModeB"; show-text "Anime: Anime4K Mode B"
CTRL+2 apply-profile "Anime_Anime4K_Heavy"; show-text "Anime: Anime4K Heavy Upscale"
CTRL+3 apply-profile "Anime_Anime4K_Light"; show-text "Anime: Anime4K Light De-blur"
CTRL+4 apply-profile "Movie_FSRCNNX"; show-text "Movie: FSRCNNX Crisp"
CTRL+5 apply-profile "Movie_SSIM"; show-text "Movie: SSIM Downscale"
CTRL+6 apply-profile "Movie_Denoise"; show-text "Movie: Denoise + Downscale"
CTRL+7 apply-profile "Movie_Upscale"; show-text "Movie: Upscale + Downscale"
CTRL+8 apply-profile "Movie_Deblur"; show-text "Movie: Deblur + Denoise"

# Subtitle size
- add sub-font-size -2; show-text "Sub size: ${sub-font-size}"
= add sub-font-size +2; show-text "Sub size: ${sub-font-size}"

CTRL+- add sub-scale -0.1; show-text "Sub size: ${sub-scale}"
CTRL+= add sub-scale +0.1; show-text "Sub size: ${sub-scale}"

ALT+- add sub-line-spacing -1; show-text "Sub spacing: ${sub-line-spacing}"
ALT+= add sub-line-spacing +1; show-text "Sub spacing: ${sub-line-spacing}"

# ── Seek ──
h seek -7; show-text "Back 7s"
l seek 5; show-text "Forward 5s"

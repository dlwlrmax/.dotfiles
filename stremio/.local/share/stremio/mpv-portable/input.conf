# Stremio Enhanced - Default Input Configuration
# This file is automatically created if it doesn't exist
# You can customize it at: ~/.local/share/stremio/mpv-portable/input.conf
#
# MPV default keybindings are available. See: https://mpv.io/manual/master/#interactive-control
# To add custom shaders (like Anime4K), place them in ~/.local/share/stremio/mpv-portable/shaders/
# and configure keybindings here.

# GLOBAL RESET
CTRL+0 no-osd change-list glsl-shaders clr ""; show-text "Shaders: None"

# ANIME PRESETS
CTRL+1 no-osd change-list glsl-shaders clr ""; change-list glsl-shaders append "~~/shaders/ArtCNN_C4F16.glsl"; change-list glsl-shaders append "~~/shaders/KrigBilateral.glsl"; change-list glsl-shaders append "~~/shaders/SSimDownscaler.glsl"; show-text "Anime: High-Fidelity"

CTRL+2 no-osd change-list glsl-shaders clr ""; change-list glsl-shaders append "~~/shaders/Anime4K_Clamp_Highlights.glsl"; change-list glsl-shaders append "~~/shaders/Anime4K_Restore_CNN_M.glsl"; change-list glsl-shaders append "~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "Anime: Anime4K Heavy Upscale"

CTRL+3 no-osd change-list glsl-shaders clr ""; change-list glsl-shaders append "~~/shaders/Anime4K_Clamp_Highlights.glsl"; change-list glsl-shaders append "~~/shaders/Anime4K_Restore_CNN_S.glsl"; show-text "Anime: Anime4K Light De-blur"

CTRL+4 show-text "Anime Slot 4: Unassigned"

# MOVIE PRESETS
CTRL+5 no-osd change-list glsl-shaders clr ""; change-list glsl-shaders append "~~/shaders/ArtCNN_C4F16.glsl"; change-list glsl-shaders append "~~/shaders/KrigBilateral.glsl"; change-list glsl-shaders append "~~/shaders/SSimDownscaler.glsl"; show-text "Movie: ArtCNN High-Fidelity"

CTRL+6 no-osd change-list glsl-shaders clr ""; change-list glsl-shaders append "~~/shaders/FSRCNNX_x2_8-0-4-1.glsl"; change-list glsl-shaders append "~~/shaders/SSimDownscaler.glsl"; show-text "Movie: FSRCNNX Crisp"

CTRL+7 no-osd change-list glsl-shaders clr ""; change-list glsl-shaders append "~~/shaders/SSimDownscaler.glsl"; show-text "Movie: SSIM Downscale"

CTRL+8 show-text "Movie Slot 8: Unassigned"

# Subtitle size
- add sub-font-size -2; show-text "Sub size: ${sub-font-size}"
= add sub-font-size +2; show-text "Sub size: ${sub-font-size}"

CTRL+- add sub-scale -0.1; show-text "Sub size: ${sub-scale}"
CTRL+= add sub-scale +0.1; show-text "Sub size: ${sub-scale}"

ALT+- add sub-line-spacing -1; show-text "Sub spacing: ${sub-line-spacing}"
ALT+= add sub-line-spacing +1; show-text "Sub spacing: ${sub-line-spacing}"

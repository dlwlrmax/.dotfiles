# Stremio Enhanced - Default MPV Configuration
# This file is automatically created if it doesn't exist
# Customize at: ~/.local/share/stremio/mpv-portable/mpv.conf

# Video Output
vo=gpu                           # Use stable video output (gpu-next can black-screen on some setups)
hwdec=auto-safe                  # Enable hardware decoding (safe mode)
profile=gpu-hq                   # High quality GPU rendering preset

# Performance
cache=yes                        # Enable cache
cache-secs=300                  # Cache 300s of stream ahead
cache-pause=no                  # Don't pause playback on buffer drain
demuxer-max-bytes=512M          # Large cache for streaming
demuxer-max-back-bytes=128M     # Backward cache
# Video Quality
scale=ewa_lanczossharp          # High quality upscaling
cscale=ewa_lanczossharp         # High quality chroma upscaling
dscale=mitchell                  # Downscaling algorithm
correct-downscaling=yes          # Better quality when downscaling

# Deband (reduce compression artifacts)
deband=yes
deband-iterations=4
deband-threshold=35
deband-range=16
deband-grain=5

# Interpolation (smooth motion)
video-sync=display-resample
interpolation=yes
tscale=oversample

# Subtitles
sub-auto=fuzzy                   # Auto-load subtitle files
sub-font-size=52
sub-scale=1
sub-font='Playpen Sans Bold'
sub-border-size=3
sub-shadow-offset=1
sub-color="#FFFFFF"
sub-border-color="#000000"
sub-shadow-color="#000000"
sub-line-spacing=-5
sub-pos=92
slang=vi,vie,en,eng

# Audio
audio-file-auto=fuzzy            # Auto-load audio files
volume=100
volume-max=150
alang=jpn,jp,ko,kor,en,eng
# Route audio directly to BTR3K hardware, bypassing EasyEffects.
# EasyEffects crashes with SIGABRT when PipeWire graph changes
# (new client connects or device reconnects), killing all system audio.
audio-device='pipewire/alsa_output.usb-FiiO_FiiO_BTR3K_ABCDEF0123456789-00.analog-stereo'
# Lock output to BTR3K's native format so MPV handles downmix/conversion
# internally. Without this, PipeWire does it externally and can freeze the graph.
audio-channels=stereo
audio-format=s16
# If you want EQ for Stremio, use mpv's built-in equalizer:
# af='equalizer=f1=60:w1=4:w1_t=o:f2=170:w2=3:w2_t=o:f3=310:w3=0:f4=600:w4=2:f5=1000:w5=1:f6=3000:w6=2:f7=6000:w7=3:f8=12000:w8=2:f9=14000:w9=3:f10=16000:w10=2'

# Screenshots
screenshot-format=png
screenshot-png-compression=8
screenshot-directory=~/Pictures/Stremio
screenshot-template=stremio_%tY%tm%td_%tH%tM%tS_%n

# OSD (On Screen Display)
osd-font-size=40
osd-border-size=2
osd-on-seek=msg

# General
keep-open=yes                    # Don't close window after playback
save-position-on-quit=no         # Don't save position (Stremio handles this)

# ──────────────────────────────────────────────
# Anime4K Shader Profiles
# Activated via input.conf keybindings (Ctrl+0-8)
# See: https://mpv.io/manual/stable/#profiles
# ──────────────────────────────────────────────

[Anime4K_Off]
profile-desc="No shaders"
glsl-shaders=""


[Anime_Anime4K_Heavy]
profile-desc="Anime: Anime4K Heavy Upscale"
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

[Anime_Anime4K_Light]
profile-desc="Anime: Anime4K Light De-blur"
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_S.glsl"

[Movie_FSRCNNX]
profile-desc="Movie: FSRCNNX Crisp Upscale"
glsl-shaders="~~/shaders/FSRCNNX_x2_8-0-4-1.glsl:~~/shaders/SSimDownscaler.glsl"

[Movie_SSIM]
profile-desc="Movie: SSIM Downscale Only"
glsl-shaders="~~/shaders/SSimDownscaler.glsl"


[Movie_Upscale]
profile-desc="Movie: Upscale + SSIM Downscale"
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/SSimDownscaler.glsl"

[Movie_Deblur]
profile-desc="Movie: Deblur + Denoise + Downscale"
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Deblur_DoG.glsl:~~/shaders/Anime4K_Denoise_Bilateral_Median.glsl:~~/shaders/SSimDownscaler.glsl"
[Anime_Anime4K_ModeB]
profile-desc="Anime: Anime4K Mode B (Restore Soft + Upscale)"
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_Soft_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

[Movie_Denoise]
profile-desc="Movie: Denoise + Downscale"
glsl-shaders="~~/shaders/Anime4K_Denoise_Bilateral_Mode.glsl:~~/shaders/SSimDownscaler.glsl"
hr-seek=no

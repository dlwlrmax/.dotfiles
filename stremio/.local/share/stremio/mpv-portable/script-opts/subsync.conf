# subsync configuration
# Auto-sync subtitles using ffsubsync (audio fingerprinting)
# Press 'n' to sync

# Path to ffsubsync executable
# Install: pip install ffsubsync
ffsubsync_path=ffsubsync

# Max seconds of video to analyze (0 = full video)
# Lower = faster but less accurate for long videos
max_duration=600

# Show OSD messages (yes/no)
osd=yes

# OSD message duration in seconds
osd_duration=3

# Auto-sync on file load (yes/no)
# Disabled by default - press 'n' to sync manually
auto_sync=no

# Temp directory for downloaded URL subtitles
temp_dir=/tmp/stremio-subs
